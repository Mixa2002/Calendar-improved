<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1 id="app-title">Calendar</h1>
    </header>

    <main>
        <section class="calendar" aria-label="Calendar">
            <div class="calendar-controls">
                <div class="view-toggle" id="view-toggle" role="group" aria-label="Calendar view">
                    <button type="button" data-view="week" class="active">Week</button>
                    <button type="button" data-view="month">Month</button>
                </div>
                <div class="nav">
                    <button type="button" id="prev-btn" class="nav-btn" aria-label="Previous">&#8249;</button>
                    <span id="calendar-title" aria-live="polite"></span>
                    <button type="button" id="next-btn" class="nav-btn" aria-label="Next">&#8250;</button>
                </div>
            </div>
            <div class="weekdays" aria-hidden="true">
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
                <div>Sun</div>
            </div>
            <div class="days" id="days" role="grid" aria-label="Days"></div>
        </section>

        <section id="day-panel" class="day-panel" aria-label="Selected day tasks" hidden>
            <div class="day-panel-header">
                <h2 id="day-panel-title"></h2>
                <button type="button" id="day-panel-close" class="btn-ghost">Close</button>
            </div>
            <div id="day-panel-tasks"></div>
        </section>

        <section class="goals" aria-label="Goals">
            <div class="goals-header">
                <h2>Goals</h2>
                <button id="add-goal-btn" class="btn-primary">+ Add goal</button>
            </div>
            <div id="goal-form" class="goal-form" hidden></div>
            <div id="goals-list"></div>
        </section>
    </main>

    <div id="sr-status" role="status" aria-live="polite" class="sr-only"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
